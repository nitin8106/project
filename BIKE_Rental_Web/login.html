<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RideRental</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="logo">Ride<span>Rental</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bikes.html">Bikes</a></li>
      <li><a href="login.html" class="active link-login">Login</a></li>
      <li><a href="register.html" class="btn-nav link-register">Register</a></li>
      <li><a href="#" class="user-greet" style="display:none;color:#ff6b35;font-weight:700;cursor:default"></a></li>
      <li><a href="#" class="link-logout" style="display:none" onclick="logout()">Logout</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Welcome Back 👋</h2>
      <p class="subtitle">Login to your RideRental account</p>

      <div class="alert" id="login-alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com">
          <span class="error-msg" id="login-email-err"></span>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password">
          <span class="error-msg" id="login-password-err"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

      <div style="text-align:center;margin-top:15px;padding:12px;background:#fff5f2;border-radius:8px;font-size:0.82rem;color:#666;">
        <strong>Demo:</strong> Register first, then login with your credentials
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
