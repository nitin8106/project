<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RideRental</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="register">

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="logo">Ride<span>Rental</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="bikes.html">Bikes</a></li>
      <li><a href="login.html" class="link-login">Login</a></li>
      <li><a href="register.html" class="btn-nav active link-register">Register</a></li>
      <li><a href="#" class="user-greet" style="display:none;color:#ff6b35;font-weight:700;cursor:default"></a></li>
      <li><a href="#" class="link-logout" style="display:none" onclick="logout()">Logout</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Create Account 🏍️</h2>
      <p class="subtitle">Join RideRental and start your adventure</p>

      <div class="alert" id="reg-alert"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe">
          <span class="error-msg" id="reg-name-err"></span>
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com">
          <span class="error-msg" id="reg-email-err"></span>
        </div>
        <div class="form-group">
          <label for="reg-phone">Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="10-digit mobile number" maxlength="10">
          <span class="error-msg" id="reg-phone-err"></span>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Minimum 6 characters">
          <span class="error-msg" id="reg-password-err"></span>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Re-enter your password">
          <span class="error-msg" id="reg-confirm-err"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
